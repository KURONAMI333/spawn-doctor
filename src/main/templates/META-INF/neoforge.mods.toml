modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
${mod_description}
'''

# No mixins. One read-only, on-demand command. Diagnoses from certain
# vanilla facts only (difficulty, gamerule, loaded hostiles, distances).

# versionRange uses neo_version, NOT loader_version_range (composing the
# loader range here is unparseable — lesson from Free Server Saver).
[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
